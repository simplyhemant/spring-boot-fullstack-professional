# Staging Configuration

# Supabase connection using the Connection Pooler (PgBouncer, Port 6543)
# Note: prepareThreshold=0 is required for PgBouncer transaction mode compatibility
spring.datasource.url=jdbc:postgresql://db.supabase.co:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres
spring.datasource.password=your-supabase-password
spring.jpa.hibernate.ddl-auto=update

# Tuning HikariCP for Supabase (PgBouncer)
# Since PgBouncer/Supabase drops idle connections, we keep max-lifetime short (5 minutes / 300000ms)
# and send periodic keepalives (30 seconds / 30000ms) to ensure connections stay fresh.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=30000

# Redis configuration (to be overridden by environment variables in staging)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=1000
spring.redis.connect-timeout=1000

# CORS settings for staging
app.cors.allowed-origins=http://localhost:3000,https://your-staging-frontend.vercel.app
